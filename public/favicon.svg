<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="url(#bg)" />
  
  <!-- Robot Head Outline -->
  <path d="M 25 35 Q 50 15 75 35 L 75 75 Q 50 95 25 75 Z" fill="url(#neon)" opacity="0.3" />
  
  <!-- Visor -->
  <rect x="25" y="40" width="50" height="25" rx="10" fill="url(#neon)" />
  
  <!-- Eyes -->
  <circle cx="35" cy="52" r="6" fill="#ffffff" />
  <circle cx="65" cy="52" r="6" fill="#ffffff" />
  
  <!-- Antenna -->
  <rect x="47" y="10" width="6" height="15" fill="#a1a1aa" />
  <circle cx="50" cy="8" r="5" fill="url(#neon)" />
</svg>